  <title>福美株式会社 | 年度报告</title>
  <style>
    :root{--bg:#f3ede5;--panel:rgba(255,255,255,.34);--panel2:rgba(255,250,244,.48);--line:rgba(103,81,56,.14);--text:#231c17;--muted:#6d6054;--muter:#9a8b7b;--brand:#b9965d;--max:1240px}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 0 0, rgba(255,255,255,.76), transparent 24%),radial-gradient(circle at 100% 8%, rgba(185,150,93,.14), transparent 20%),linear-gradient(180deg, #f8f3ec 0%, #f1e9df 54%, #ebe1d5 100%);color:var(--text);font-family:Inter,"PingFang SC","Microsoft YaHei UI","Noto Sans SC",sans-serif;-webkit-font-smoothing:antialiased}
    a{text-decoration:none;color:inherit} .wrap{width:min(var(--max),calc(100% - 32px));margin:auto}
    .top{position:sticky;top:0;z-index:20;background:rgba(248,243,236,.74);backdrop-filter:blur(16px);border-bottom:1px solid rgba(103,81,56,.08)}
    .nav{height:72px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    .back,.lang-btn{height:42px;padding:0 16px;border:1px solid var(--line);border-radius:999px;display:inline-flex;align-items:center;background:rgba(255,255,255,.30);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .lang-box{display:flex;gap:8px} [data-lang="zh"] .lang-btn[data-l="zh"],[data-lang="ja"] .lang-btn[data-l="ja"]{background:#3a3028;color:#fff;border-color:#3a3028}
    .hero{padding:46px 0 28px}.tag{display:inline-flex;padding:8px 14px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase}
    h1{margin:18px 0 14px;font-size:clamp(42px,8vw,96px);line-height:.92;letter-spacing:-.07em;max-width:9ch}
    .lead{max-width:820px;color:var(--muted);font-size:17px;line-height:1.9}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:24px}
    .card{padding:22px;border:1px solid var(--line);border-radius:26px;background:linear-gradient(180deg, rgba(255,255,255,.56), rgba(252,246,238,.28))}
    .card small{display:block;color:var(--muter);text-transform:uppercase;letter-spacing:.15em;margin-bottom:10px}.card strong{font-size:20px}
    .layout{display:grid;grid-template-columns:280px 1fr;gap:18px;padding:20px 0 46px}
    .side,.main{border:1px solid var(--line);border-radius:30px;background:rgba(255,255,255,.30)}
    .side{position:sticky;top:92px;height:fit-content;padding:24px}.side h3{margin:0 0 16px;font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--muter)}
    .side a{display:block;padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.30);margin-bottom:10px;color:var(--muted)}
    .main{padding:18px 28px 28px}.sec{padding:28px 0;border-top:1px solid rgba(103,81,56,.08)}.sec:first-child{border-top:none}
    .idx{font-size:12px;color:var(--brand);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}.sec h2{margin:0 0 12px;font-size:clamp(30px,4vw,54px);line-height:.98;letter-spacing:-.06em}
    .sec p{margin:0 0 12px;color:var(--muted);font-size:16px;line-height:1.95}.hl{padding:18px 20px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.30);color:#dbdbd3}
    .list{display:grid;gap:10px;margin-top:10px}.item{padding:16px 18px;border:1px solid var(--line);border-radius:20px;background:rgba(255,255,255,.025);color:var(--muted)}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.side{position:static}.cards{grid-template-columns:1fr}}
    @media (max-width:760px){.main{padding:16px 18px 20px}}
  </style>
</head>
<body>
  <header class="top">
    <div class="wrap nav">
      <a class="back t" href="skyui-closer-index.html" data-zh="返回首页" data-ja="トップへ戻る"></a>

  <section class="hero wrap">
    <span class="tag">Annual Report</span>
    <h1 class="t" data-zh="2025 年述职报告与今后规划。" data-ja="2025年度業務報告と今後の計画。"></h1>
    <p class="lead t" data-zh="我把报告页也改成了和首页统一的风格：深色、强标题、模块化、适合展示与打印，不再像传统文档页面那样松散。" data-ja="レポートページもトップページと統一したデザインへ再構成し、強いタイポグラフィとモジュール構成で、閲覧にも印刷にも適した形にしました。"></p>
    <div class="cards">
      <div class="card"><small>Company</small><strong>福美株式会社</strong></div>
      <div class="card"><small>Representative</small><strong>朱麗燕</strong></div>
      <div class="card"><small>Date</small><strong>2026.04.16</strong></div>
    </div>
  </section>
  <div class="wrap layout">
    <aside class="side">
      <h3>Contents</h3>
      <a href="#s1" class="t" data-zh="公司基本情况" data-ja="会社基本状況"></a>
      <a href="#s2" class="t" data-zh="年度经营情况" data-ja="年度経営状況"></a>

    <article class="main">
      <section class="sec" id="s1"><div class="idx">01</div><h2 class="t" data-zh="公司基本情况" data-ja="会社基本状況"></h2><p class="t" data-zh="本公司依法在日本设立并持续经营，主营业务包括日本动漫周边及宝可梦卡片等商品的出口贸易、日本不动产投资及管理，以及医疗咨询及健康相关业务拓展。" data-ja="当社は日本において適法に設立され継続的に事業を運営しており、日本アニメ関連商品・ポケモンカード等の輸出貿易、不動産投資・管理、医療相談および健康関連事業の拡大を主な事業としています。"></p><div class="list"><div class="item t" data-zh="出口贸易为核心业务板块" data-ja="輸出貿易は中核事業です"></div><div class="item t" data-zh="不动产投资与管理为稳定收益来源" data-ja="不動産投資・管理は安定収益源です"></div><div class="item t" data-zh="医疗咨询业务为发展中增长方向" data-ja="医療相談事業は成長分野です"></div></div></section>
      <section class="sec" id="s2"><div class="idx">02</div><h2 class="t" data-zh="年度经营情况" data-ja="年度経営状況"></h2><p class="t" data-zh="贸易业务持续增长，2024 年出口额约 769 万日元，2025 年约 936 万日元。随着市场竞争加剧，利润率有所下降，但公司正通过优化采购与渠道改善利润结构。" data-ja="貿易事業は継続的に成長しており、2024年の輸出額は約769万円、2025年は約936万円となりました。競争激化により利益率は低下しましたが、仕入れと販路の最適化で改善を進めています。"></p><div class="hl t" data-zh="不动产业务方面，2025 年租金收入约 529 万日元，公司持续扩大老旧住宅翻新和出租运营规模。" data-ja="不動産事業では、2025年の家賃収入は約529万円であり、老朽住宅の改修と賃貸運営を継続拡大しています。"></div><p class="t" data-zh="医疗咨询收入因业务调整和人力不足有所下降，但随着专业人员在 2026 年 4 月入职，预计将恢复增长。" data-ja="医療相談事業は調整と人員不足で一時的に減収しましたが、2026年4月の専門人材加入により回復成長が見込まれます。"></p></section>
      <section class="sec" id="s3"><div class="idx">03</div><h2 class="t" data-zh="组织结构与用工情况" data-ja="組織体制と雇用状況"></h2><p class="t" data-zh="公司已对员工薪酬进行调整，员工年收入由 224 万日元提升至 264 万日元，代表取缔役年报酬由 260 万日元提升至 303 万日元。目前已有日籍人员参与兼职工作，预计后续转为正式雇佣。" data-ja="当社は給与水準を調整し、従業員の年収は224万円から264万円へ、代表取締役の年間報酬は260万円から303万円へ増額しました。現在、日本人スタッフがパート勤務しており、今後正式雇用へ移行する予定です。"></p></section>
      <section class="sec" id="s4"><div class="idx">04</div><h2 class="t" data-zh="资金来源及财务状况" data-ja="資金源と財務状況"></h2><p class="t" data-zh="公司主要资金来源为实际经营收入，包括出口贸易收入、不动产租金收入以及医疗咨询服务收入。公司目前没有任何银行借贷及不良资产。" data-ja="当社の主な資金源は営業収入であり、輸出貿易収入、不動産賃料収入、医療相談サービス収入で構成されています。現在、銀行借入や不良資産はありません。"></p><div class="hl t" data-zh="公司计划于下一决算期实施债转股，将注册资本金提升至 3000 万日元。" data-ja="次回決算期にデット・エクイティ・スワップを実施し、資本金を3,000万円へ引き上げる予定です。"></div></section>
      <section class="sec" id="s5"><div class="idx">05</div><h2 class="t" data-zh="未来发展规划" data-ja="今後の発展計画"></h2><div class="list"><div class="item t" data-zh="扩大贸易规模，提高营业额与利润水平" data-ja="貿易規模を拡大し、売上高と利益水準を引き上げる"></div><div class="item t" data-zh="深化日本国内贸易业务，推进线下实体店筹建" data-ja="日本国内取引を深化し、実店舗準備を進める"></div><div class="item t" data-zh="持续扩大不动产投资并优化管理" data-ja="不動産投資を継続拡大し、管理品質を高める"></div><div class="item t" data-zh="全面启动医疗咨询业务" data-ja="医療相談事業を本格始動させる"></div></div></section>
    </article>
  </div>
  <script>
    (function(){var KEY='fukumi-lang';var root=document.documentElement;var nodes=document.querySelectorAll('.t');function apply(lang){lang=lang==='ja'?'ja':'zh';root.setAttribute('data-lang',lang);root.lang=lang==='ja'?'ja':'zh-CN';nodes.forEach(function(n){var v=n.getAttribute('data-'+lang);if(v!=null)n.textContent=v});document.title=lang==='ja'?'福美株式会社 | 年次報告':'福美株式会社 | 年度报告';try{localStorage.setItem(KEY,lang)}catch(e){}};document.querySelectorAll('.lang-btn').forEach(function(b){b.addEventListener('click',function(){apply(b.getAttribute('data-l'))})});try{apply(localStorage.getItem(KEY)||'zh')}catch(e){apply('zh')}})();
  </script>
